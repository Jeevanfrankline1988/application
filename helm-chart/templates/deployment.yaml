apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pygame.fullname" . }}
  labels:
    app: {{ include "pygame.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "pygame.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "pygame.name" . }}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: SDL_VIDEODRIVER
              value: "dummy"   # Enable headless mode for Pygame
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
              ephemeral-storage: {{ index .Values.resources.requests "ephemeral-storage" }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
              ephemeral-storage: {{ index .Values.resources.limits "ephemeral-storage" }}
          volumeMounts:
            - name: pygame-storage
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3    
      volumes:
        - name: pygame-storage
          emptyDir: {}
