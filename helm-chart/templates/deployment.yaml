apiVersion: apps/v1
kind: Deployment
metadata:
  name: pygame
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pygame
  template:
    metadata:
      labels:
        app: pygame
    spec:
      automountServiceAccountToken: false   
      containers:
        - name: pygame
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"   
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          resources:                       
            requests:
              cpu: "100m"                  
              memory: "128Mi"              
            limits:
              cpu: "500m"                  
              memory: "256Mi"               
          volumeMounts:                     
            - name: pygame-storage
              mountPath: /data
      volumes:
        - name: pygame-storage
          emptyDir: {}                     

