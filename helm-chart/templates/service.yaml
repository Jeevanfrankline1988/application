apiVersion: v1
kind: Service
metadata:
  name: {{ include "pygame.fullname" . }}
  labels:
    app: {{ include "pygame.name" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      nodePort: {{ .Values.service.nodePort }}
      protocol: TCP
      name: http
  selector:
    app: {{ include "pygame.name" . }}
