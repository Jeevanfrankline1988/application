# Unique project key in SonarQube (must match your Jenkinsfile if hardcoded)
sonar.projectKey=python-app

# Project name (shows in SonarQube dashboard)
sonar.projectName=Python Game Application

# Project version
sonar.projectVersion=1.0

# Source directory (your code location)
sonar.sources=.

# Exclude tests and virtual environment
sonar.exclusions=venv/**, tests/**

# Encoding
sonar.sourceEncoding=UTF-8

# Python-specific settings
sonar.language=py
sonar.python.version=3

# Reports (optional if you use pylint, bandit, etc.)
# sonar.python.pylint.reportPath=pylint-report.txt
# sonar.python.bandit.reportPaths=bandit-report.json
