<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game 🐍</title>
<style>
  body {
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial, sans-serif;
  }
  canvas {
    border: 3px solid #00ff00;
    margin-top: 20px;
    background: black;
  }
</style>
</head>
<body>
<h1>Snake Game 🐍</h1>
<p>Use arrow keys to move the snake</p>
<canvas id="game" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const CELL_SIZE = 20;

// Send arrow keys to server
document.addEventListener("keydown", e => {
    const dirMap = {
        ArrowUp: "UP",
        ArrowDown: "DOWN",
        ArrowLeft: "LEFT",
        ArrowRight: "RIGHT"
    };
    const dir = dirMap[e.key];
    if(dir) {
        fetch("/move", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({direction: dir})
        });
    }
});

// Draw game based on server state
async function draw() {
    const res = await fetch("/state");
    const data = await res.json();

    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width, canvas.height);

    // Draw food
    ctx.fillStyle = "red";
    ctx.fillRect(data.food[0], data.food[1], CELL_SIZE, CELL_SIZE);

    // Draw snake
    ctx.fillStyle = "lime";
    data.snake.forEach(([x,y]) => ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE));
}

// Animation loop
setInterval(draw, 100); // 10 FPS
</script>
</body>
</html>
