<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>
    <style>
        body { text-align:center; background:#222; color:#fff; font-family:sans-serif; }
        canvas { background:#000; display:block; margin:20px auto; border:2px solid #fff; }
    </style>
</head>
<body>
    <h1>Snake Game (Python → Browser)</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <p>Use arrow keys to move the snake</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        function updateFrame() {
            fetch("/frame")
                .then(res => res.blob())
                .then(blob => {
                    const img = new Image();
                    img.src = URL.createObjectURL(blob);
                    img.onload = () => {
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    };
                });
        }

        // Refresh at ~10 FPS
        setInterval(updateFrame, 100);

        // Send key presses to backend
        document.addEventListener("keydown", (e) => {
            fetch(`/keydown/${e.key}`);
        });
    </script>
</body>
</html>
