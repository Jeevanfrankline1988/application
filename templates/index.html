<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>
    <style>
        body { text-align:center; background:#222; color:#fff; }
        img { border: 3px solid #fff; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Snake Game in Browser</h1>
    <img id="game_frame" src="{{ url_for('video_feed') }}" width="400" height="400">

    <script>
        document.addEventListener('keydown', function(event) {
            let key = null;
            switch(event.key) {
                case 'ArrowUp': key = 'UP'; break;
                case 'ArrowDown': key = 'DOWN'; break;
                case 'ArrowLeft': key = 'LEFT'; break;
                case 'ArrowRight': key = 'RIGHT'; break;
            }
            if(key) {
                fetch('/move', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({key: key})
                });
            }
        });
    </script>
</body>
</html>
